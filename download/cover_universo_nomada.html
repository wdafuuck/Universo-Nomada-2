<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Nomada - Plan Estrategico</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 794px 1123px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 794px; height: 1123px; background: #fafaf8; }

  .cover {
    position: relative;
    width: 794px;
    height: 1123px;
    background: #fafaf8;
  }

  /* Layer 1 - Background */
  .bg-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }
  .watermark {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Playfair Display', serif;
    font-size: 180px;
    font-weight: 900;
    color: #4c4735;
    opacity: 0.03;
    white-space: nowrap;
    letter-spacing: 8px;
  }

  /* Layer 2 - Structure */
  .struct-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  .color-dash {
    position: absolute;
    left: 0.12 * 794px;
    left: 95px;
    top: 0.15 * 1123px;
    top: 168px;
    width: 50px;
    height: 5px;
    background: #633dd4;
  }
  .meta-line {
    position: absolute;
    left: 95px;
    bottom: 200px;
    width: 2px;
    height: 100px;
    background: #4c4735;
    opacity: 0.5;
  }

  /* Layer 3 - Content */
  .content-layer {
    position: absolute;
    inset: 0;
    z-index: 3;
    padding-left: 95px;
  }

  .kicker {
    position: absolute;
    left: 95px;
    top: 195px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #4c4735;
    opacity: 0.6;
    text-transform: uppercase;
  }

  .hero-title {
    position: absolute;
    left: 95px;
    top: 230px;
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    color: #161514;
    line-height: 1.15;
    max-width: 450px;
  }

  .summary {
    position: absolute;
    left: 95px;
    top: 500px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #161514;
    opacity: 0.85;
    line-height: 1.6;
    max-width: 420px;
  }

  .meta {
    position: absolute;
    left: 95px;
    top: 760px;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #8d8b84;
    line-height: 2.0;
  }

  .footer {
    position: absolute;
    right: 50px;
    bottom: 60px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #4c4735;
    opacity: 0.5;
    text-align: right;
  }
</style>
</head>
<body>
<div class="cover">
  <!-- Layer 1: Background -->
  <div class="bg-layer">
    <div class="watermark">NOMADA</div>
  </div>

  <!-- Layer 2: Structure -->
  <div class="struct-layer">
    <div class="color-dash"></div>
    <div class="meta-line"></div>
  </div>

  <!-- Layer 3: Content -->
  <div class="content-layer">
    <div class="kicker">PLAN ESTRATEGICO 2026</div>
    <div class="hero-title">Universo<br/>Nomada</div>
    <div class="summary">Analisis integral, automatizacion de procesos y estrategia de crecimiento para multiplicar las ventas de tu agencia boutique de viajes en La Serena, Chile.</div>
    <div class="meta">
      La Serena, Chile<br/>
      Abril 2026<br/>
      Documento Confidencial
    </div>
    <div class="footer">
      Automatizacion + Ventas<br/>
      +100% Crecimiento
    </div>
  </div>
</div>
</body>
</html>
